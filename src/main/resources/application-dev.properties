# ── Dev profile overrides ─────────────────────────────────────────────
# These values are only active when spring.profiles.active=dev

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.thymeleaf.cache=false
logging.level.org.springframework.security=DEBUG
logging.level.com.restaurant.rms=DEBUG

# Dev: let Hibernate create/update tables from entities automatically
# (avoids needing to run schema.sql manually)
spring.jpa.hibernate.ddl-auto=update

# Also run schema.sql after Hibernate has set up the schema
# (seeds indexes, views, or initial data defined there)
spring.sql.init.mode=always
spring.jpa.defer-datasource-init