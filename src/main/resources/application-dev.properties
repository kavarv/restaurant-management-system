# ==============================================================================
# application-dev.properties  —  DEVELOPMENT overrides
# Activated with: -Dspring.profiles.active=dev  (default in base properties)
# These values are safe to commit; they contain NO secrets.
# ==============================================================================

# ── DATASOURCE ────────────────────────────────────────────────────────────────
# Local MySQL — credentials supplied as env vars in your IDE run config:
#   DB_USERNAME=rms_user
#   DB_PASSWORD=your_local_password
spring.datasource.url=jdbc:mysql://localhost:3306/rms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# small pool — only one developer connecting locally
spring.datasource.hikari.maximum-pool-size=5


# ── JPA ───────────────────────────────────────────────────────────────────────
# During initial schema development you may temporarily switch to "create" or
# "create-drop" locally, but NEVER commit that change.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ── THYMELEAF ─────────────────────────────────────────────────────────────────
# Templates reload on every request — no server restart needed after edits
spring.thymeleaf.cache=false


# ── SECURITY ──────────────────────────────────────────────────────────────────
# Verbose security logging helps trace filter chain issues during development
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG


# ── ACTUATOR ──────────────────────────────────────────────────────────────────
# Expose all endpoints locally for easier debugging
management.endpoints.web.exposure.include=*
# show full health detail without authentication in dev
management.endpoint.health.show-details=always


# ── DEVTOOLS ──────────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=true
# browser auto-refresh via LiveReload plugin
spring.devtools.livereload.enabled=true


# ── SPRINGDOC ─────────────────────────────────────────────────────────────────
# Show actuator endpoints in Swagger UI during dev
springdoc.show-actuator=true


# ── LOGGING ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.restaurant.rms=DEBUG
# log SQL statements
logging.level.org.hibernate.SQL=DEBUG
# log bind parameter values (Hibernate 6+)
logging.level.org.hibernate.orm.jdbc.bind=TRACE
