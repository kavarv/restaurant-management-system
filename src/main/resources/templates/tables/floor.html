<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Floor View')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'tables', 'Floor View')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title">Floor View</h1>
      <p class="page-subtitle">Live table status — updates in real time</p>
    </div>
    <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
      <a th:href="@{/tables/new}" class="btn btn-primary">Add Table</a>
    </sec:authorize>
  </div>

  <!-- Legend -->
  <div class="flex gap-3 flex-wrap" style="margin-bottom:var(--space-5);">
    <div class="flex items-center gap-2">
      <div style="width:14px;height:14px;border-radius:3px;background:#A5D6A7;border:1px solid #81C784;"></div>
      <span class="text-sm">Available</span>
    </div>
    <div class="flex items-center gap-2">
      <div style="width:14px;height:14px;border-radius:3px;background:#EF9A9A;border:1px solid #E57373;"></div>
      <span class="text-sm">Occupied</span>
    </div>
    <div class="flex items-center gap-2">
      <div style="width:14px;height:14px;border-radius:3px;background:#FFD54F;border:1px solid #FFCA28;"></div>
      <span class="text-sm">Reserved</span>
    </div>
    <div class="flex items-center gap-2">
      <div style="width:14px;height:14px;border-radius:3px;background:#B0BEC5;border:1px solid #90A4AE;"></div>
      <span class="text-sm">Maintenance</span>
    </div>
  </div>

  <!-- Table Grid -->
  <div class="floor-grid" id="floorGrid">
    <div th:each="t : ${tables}"
         class="table-tile"
         th:classappend="'status-' + ${t.status}"
         th:attr="data-table-id=${t.id}, data-status=${t.status}"
         onclick="handleTableClick(this)">
      <div class="table-tile-number" th:text="${t.tableNumber}">1</div>
      <span class="badge" th:classappend="'badge-' + ${t.status}" th:text="${t.status}">-</span>
      <div class="table-tile-seats" th:text="${t.capacity} + ' seats'">4 seats</div>
    </div>
    <div th:if="${tables == null or #lists.isEmpty(tables)}" class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-icon">&#129300;</div>
      <h3>No tables configured</h3>
      <p>Add tables from the admin panel.</p>
    </div>
  </div>

  <!-- Order summary modal (for occupied table click) -->
  <div class="modal-backdrop" id="tableModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Table Details</h3>
        <button class="modal-close" onclick="closeModal('tableModal')">x</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading-spinner" style="margin:32px auto;display:block;"></div>
      </div>
      <div class="modal-footer">
        <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
          <button class="btn btn-outline btn-sm" id="changeStatusBtn" onclick="openStatusChange()">Change Status</button>
        </sec:authorize>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('tableModal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Status change modal (Admin/Manager only) -->
  <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
    <div class="modal-backdrop" id="statusModal">
      <div class="modal">
        <div class="modal-header">
          <h3>Change Table Status</h3>
          <button class="modal-close" onclick="closeModal('statusModal')">x</button>
        </div>
        <div class="modal-body">
          <form id="statusForm">
            <input type="hidden" id="statusTableId"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" id="csrfToken"/>
            <div class="form-group">
              <label for="newStatus">New Status</label>
              <select id="newStatus" class="form-control">
                <option value="AVAILABLE">Available</option>
                <option value="OCCUPIED">Occupied</option>
                <option value="RESERVED">Reserved</option>
                <option value="MAINTENANCE">Maintenance</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost btn-sm" onclick="closeModal('statusModal')">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="submitStatusChange()">Update</button>
        </div>
      </div>
    </div>
  </sec:authorize>

</main>
</div>
<script th:src="@{/js/floor.js}"></script>
</body>
</html>
