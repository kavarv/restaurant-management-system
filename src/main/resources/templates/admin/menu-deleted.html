<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Deleted Menu Items</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
    <style>
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:.6rem 1rem; border:1px solid #dee2e6; text-align:left; }
        th { background:#2c3e50; color:#fff; }
        tr:nth-child(even) { background:#f8f9fa; }
        .badge-deleted { background:#e74c3c; color:#fff; padding:.2rem .6rem; border-radius:4px; font-size:.8rem; }
        .btn { padding:.4rem .9rem; border:none; border-radius:4px; cursor:pointer; font-size:.875rem; }
        .btn-restore { background:#27ae60; color:#fff; }
        .btn-restore:hover { background:#219150; }
        .empty-state { text-align:center; padding:3rem; color:#6c757d; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>Soft-Deleted Menu Items</h1>
        <a th:href="@{/admin/dashboard}" class="btn" style="background:#95a5a6;color:#fff;">← Dashboard</a>
    </div>

    <p style="color:#6c757d; margin-bottom:1rem;">
        These items have been removed from the live menu but their order history is preserved.
        Restoring an item makes it visible in the menu again.
    </p>

    <div th:if="${#lists.isEmpty(deletedItems)}" class="empty-state">
        <p>✅ No soft-deleted menu items found.</p>
    </div>

    <table th:unless="${#lists.isEmpty(deletedItems)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Deleted At</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${deletedItems}">
                <td th:text="${item.id}">1</td>
                <td>
                    <span th:text="${item.name}">Burger</span>
                    <span class="badge-deleted">deleted</span>
                </td>
                <td th:text="${item.categoryName}">Main</td>
                <td th:text="${'$' + item.price}">$12.00</td>
                <td th:text="${#temporals.format(item.deletedAt,'dd MMM yyyy HH:mm')}">01 Jun 2024</td>
                <td>
                    <form th:action="@{/admin/menu/{id}/restore(id=${item.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-restore"
                                onclick="return confirm('Restore this item to the live menu?')">
                            ↩ Restore
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
