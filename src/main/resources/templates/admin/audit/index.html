<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Audit Log</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
    <style>
        .filter-bar { display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:1.5rem;
                      background:#f8f9fa; padding:1rem; border-radius:6px; }
        .filter-bar label { font-size:.8rem; color:#555; display:flex; flex-direction:column; gap:.25rem; }
        .filter-bar input, .filter-bar select { padding:.35rem .6rem; border:1px solid #ced4da;
                                                 border-radius:4px; font-size:.875rem; }
        .btn { padding:.4rem .9rem; border:none; border-radius:4px; cursor:pointer; font-size:.875rem; }
        .btn-primary { background:#2c3e50; color:#fff; }
        .btn-primary:hover { background:#1a252f; }
        table { width:100%; border-collapse:collapse; font-size:.875rem; }
        th, td { padding:.55rem .9rem; border:1px solid #dee2e6; }
        th { background:#2c3e50; color:#fff; white-space:nowrap; }
        tr:nth-child(even) { background:#f8f9fa; }
        .badge { padding:.2rem .5rem; border-radius:3px; font-size:.75rem; font-weight:600; }
        .badge-CREATE  { background:#d4edda; color:#155724; }
        .badge-UPDATE  { background:#fff3cd; color:#856404; }
        .badge-DELETE  { background:#f8d7da; color:#721c24; }
        .badge-RESTORE { background:#d1ecf1; color:#0c5460; }
        .pagination { display:flex; gap:.5rem; justify-content:center; margin-top:1rem; }
        .pagination a { padding:.35rem .7rem; border:1px solid #dee2e6; border-radius:4px;
                        text-decoration:none; color:#2c3e50; }
        .pagination a:hover { background:#e9ecef; }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h1>Audit Log</h1>
        <a th:href="@{/admin/dashboard}" class="btn btn-primary">← Dashboard</a>
    </div>

    <!-- Filter bar -->
    <form method="get" th:action="@{/admin/audit}" class="filter-bar">
        <label>Entity Type
            <select name="entityType">
                <option value="">All</option>
                <option value="MenuItem"       th:selected="${entityType=='MenuItem'}">MenuItem</option>
                <option value="InventoryItem"  th:selected="${entityType=='InventoryItem'}">InventoryItem</option>
                <option value="Order"          th:selected="${entityType=='Order'}">Order</option>
            </select>
        </label>
        <label>From
            <input type="date" name="from" th:value="${from}"/>
        </label>
        <label>To
            <input type="date" name="to" th:value="${to}"/>
        </label>
        <label>User ID
            <input type="number" name="userId" th:value="${userId}" placeholder="any"/>
        </label>
        <label style="justify-content:flex-end;">
            <button type="submit" class="btn btn-primary" style="margin-top:1.1rem;">Filter</button>
        </label>
    </form>

    <!-- Log table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Entity</th>
                <th>Entity ID</th>
                <th>Action</th>
                <th>Changed By</th>
                <th>IP Address</th>
                <th>Changed At</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="entry : ${logs}">
                <td th:text="${entry.id}">1</td>
                <td th:text="${entry.entityType}">MenuItem</td>
                <td th:text="${entry.entityId}">42</td>
                <td>
                    <span class="badge"
                          th:classappend="'badge-' + ${entry.action}"
                          th:text="${entry.action}">UPDATE</span>
                </td>
                <td th:text="${entry.changedByUsername}">admin</td>
                <td th:text="${entry.ipAddress ?: '—'}">127.0.0.1</td>
                <td th:text="${#temporals.format(entry.changedAt,'dd MMM yyyy HH:mm')}">01 Jun</td>
                <td>
                    <a th:href="@{/admin/audit/entity/{type}/{id}(type=${entry.entityType},id=${entry.entityId})}"
                       style="font-size:.8rem; color:#2980b9;">history →</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination" th:if="${logs.totalPages > 1}">
        <a th:href="@{/admin/audit(page=0,entityType=${entityType},from=${from},to=${to},userId=${userId})}">«</a>
        <a th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
           th:href="@{/admin/audit(page=${i},entityType=${entityType},from=${from},to=${to},userId=${userId})}"
           th:text="${i + 1}"
           th:style="${i == currentPage} ? 'background:#2c3e50;color:#fff;' : ''">1</a>
        <a th:href="@{/admin/audit(page=${logs.totalPages - 1},entityType=${entityType},from=${from},to=${to},userId=${userId})}">»</a>
    </div>
</div>
</body>
</html>
