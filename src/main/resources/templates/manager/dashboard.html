<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manager Dashboard — RMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
</head>
<body>

<nav class="topnav">
    <span class="brand">🍽 RMS</span>
    <div class="nav-links">
        <a th:href="@{/manager/dashboard}" class="active">Dashboard</a>
        <a th:href="@{/orders}">Orders</a>
        <a th:href="@{/inventory}">Inventory</a>
        <a th:href="@{/reports}">Reports</a>
        <a th:href="@{/tables}">Tables</a>
    </div>
    <div class="nav-user">
        <span>👤 <strong sec:authentication="name">Manager</strong></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>

<main class="container">
    <div class="page-header">
        <h1>Manager Dashboard</h1>
        <p class="subtitle" th:text="${#temporals.format(#temporals.createNow(), 'EEEE, d MMMM yyyy')}">Today</p>
    </div>

    <!-- ── Today's revenue ─────────────────────────────────────────────── -->
    <section class="stats-grid">
        <div class="stat-card highlight">
            <div class="stat-value"
                 th:text="${dailyReport != null ? '£' + #numbers.formatDecimal(dailyReport.totalRevenue, 1, 2) : '£0.00'}">£0.00</div>
            <div class="stat-label">Today's Revenue</div>
        </div>
        <div class="stat-card">
            <div class="stat-value"
                 th:text="${dailyReport != null ? dailyReport.orderCount : 0}">0</div>
            <div class="stat-label">Orders Today</div>
        </div>
        <div class="stat-card">
            <div class="stat-value"
                 th:text="${lowStockItems != null ? lowStockItems.size() : 0}">0</div>
            <div class="stat-label">Low Stock Alerts</div>
        </div>
    </section>

    <!-- ── Low-stock alerts ─────────────────────────────────────────────── -->
    <section class="section" th:unless="${lowStockItems == null or lowStockItems.isEmpty()}">
        <h2>⚠️ Low Stock</h2>
        <table class="data-table">
            <thead><tr><th>Item</th><th>Current</th><th>Minimum</th><th>Unit</th></tr></thead>
            <tbody>
                <tr th:each="item : ${lowStockItems}" class="row-warning">
                    <td th:text="${item.name}">-</td>
                    <td th:text="${item.currentStock}">-</td>
                    <td th:text="${item.minimumStock}">-</td>
                    <td th:text="${item.unit}">-</td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/inventory}" class="btn btn-secondary">Go to Inventory →</a>
    </section>

    <!-- ── Quick actions ───────────────────────────────────────────────── -->
    <section class="section">
        <h2>Quick Actions</h2>
        <div class="action-grid">
            <a th:href="@{/orders}"    class="action-card">🧾 Orders</a>
            <a th:href="@{/inventory}" class="action-card">📦 Inventory</a>
            <a th:href="@{/reports}"   class="action-card">📊 Reports</a>
            <a th:href="@{/tables}"    class="action-card">🪑 Tables</a>
            <a th:href="@{/menu}"      class="action-card">🍽 Menu</a>
            <a th:href="@{/reservations}" class="action-card">📅 Reservations</a>
        </div>
    </section>

</main>

</body>
</html>
