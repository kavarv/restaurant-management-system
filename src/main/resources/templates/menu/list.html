<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Menu')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'menu', 'Menu')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title">Menu</h1>
      <p class="page-subtitle" th:text="${menuItems.totalElements} + ' items'"></p>
    </div>
    <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
      <div class="action-group">
        <a th:href="@{/menu/categories}" class="btn btn-outline btn-sm">Manage Categories</a>
        <a th:href="@{/menu/new}" class="btn btn-primary">Add Item</a>
      </div>
    </sec:authorize>
  </div>

  <!-- Category filter pills -->
  <div class="pills" style="margin-bottom:var(--space-5);">
    <a th:href="@{/menu}" class="pill" th:classappend="${param.category == null} ? 'active'">All</a>
    <a th:each="cat : ${categories}"
       th:href="@{/menu(category=${cat.id})}"
       class="pill"
       th:classappend="${param.category == cat.id.toString()} ? 'active'"
       th:text="${cat.name}">Category</a>
  </div>

  <!-- Search -->
  <div class="search-wrapper" style="max-width:360px;margin-bottom:var(--space-5);">
    <span class="search-icon">&#128269;</span>
    <form method="get" th:action="@{/menu}">
      <input type="text" name="q" class="form-control" placeholder="Search menu items..."
             th:value="${param.q}"/>
    </form>
  </div>

  <!-- Menu grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-5);">
    <div th:each="item : ${menuItems.content}" class="menu-card"
         th:classappend="${!item.available} ? 'unavailable'">

      <img th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
           th:src="${item.imageUrl}" th:alt="${item.name}" class="menu-card-img"/>
      <div th:if="${item.imageUrl == null or #strings.isEmpty(item.imageUrl)}"
           class="menu-card-img-placeholder">&#127829;</div>

      <div class="menu-card-body">
        <div class="menu-card-name" th:text="${item.name}">Item</div>
        <div class="text-xs text-muted" th:text="${item.categoryName}">Category</div>
        <div class="dietary-icons" style="margin-top:4px;">
          <span class="dietary-icon" th:if="${item.vegetarian}">Veg</span>
          <span class="dietary-icon" th:if="${item.vegan}">Vegan</span>
          <span class="dietary-icon" th:if="${item.glutenFree}">GF</span>
        </div>
        <div class="menu-card-price" th:text="'RM ' + ${#numbers.formatDecimal(item.price, 1, 2)}">RM 0.00</div>
        <span th:if="${!item.available}" class="badge badge-neutral" style="margin-top:4px;">Unavailable</span>

        <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
          <div class="action-group" style="margin-top:auto;padding-top:var(--space-3);">
            <a th:href="@{/menu/{id}/edit(id=${item.id})}" class="btn btn-outline btn-sm">Edit</a>
            <form th:action="@{/menu/{id}/toggle(id=${item.id})}" method="post" style="display:inline;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm"
                      th:classappend="${item.available} ? 'btn-warning' : 'btn-success'"
                      th:text="${item.available} ? 'Disable' : 'Enable'">Toggle</button>
            </form>
          </div>
        </sec:authorize>
      </div>
    </div>

    <div th:if="${menuItems == null or menuItems.totalElements == 0}"
         class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-icon">&#127829;</div>
      <h3>No menu items</h3>
      <p>Add items from the admin panel.</p>
    </div>
  </div>

  <!-- Pagination -->
  <div class="flex justify-between items-center" style="margin-top:var(--space-6);" th:if="${menuItems.totalPages > 1}">
    <nav class="pagination">
      <a th:href="@{/menu(page=${menuItems.number - 1}, category=${param.category})}"
         class="page-link" th:classappend="${menuItems.first} ? 'disabled'">Prev</a>
      <span th:each="i : ${#numbers.sequence(0, menuItems.totalPages - 1)}">
        <a class="page-link" th:classappend="${i == menuItems.number} ? 'active'"
           th:href="@{/menu(page=${i}, category=${param.category})}" th:text="${i + 1}">1</a>
      </span>
      <a th:href="@{/menu(page=${menuItems.number + 1}, category=${param.category})}"
         class="page-link" th:classappend="${menuItems.last} ? 'disabled'">Next</a>
    </nav>
  </div>

</main>
</div>
</body>
</html>
