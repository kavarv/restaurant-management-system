<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — The Restaurant</title>
  <meta name="_csrf"        th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/customer.css}"/>
</head>
<body class="customer-layout" data-page="menu">

  <nav class="customer-nav">
    <div class="nav-brand">
      <span class="nav-logo">🍽</span>
      <span class="nav-title">The Restaurant</span>
    </div>
    <ul class="nav-links">
      <li><a href="/customer/dashboard">Home</a></li>
      <li><a href="/customer/menu" class="active">Menu</a></li>
      <li><a href="/customer/reserve">Reserve</a></li>
      <li><a href="/customer/reservations">My Bookings</a></li>
    </ul>
    <form method="post" th:action="@{/logout}" class="nav-logout">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>

  <main class="customer-main">
    <section class="menu-header">
      <h1 class="page-title">Our Menu</h1>
      <div class="search-bar-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="menuSearch" class="search-input" placeholder="Search dishes…" autocomplete="off"/>
      </div>
    </section>

    <div class="filter-bar">
      <div class="category-pills" id="categoryPills">
        <button class="pill active" data-cat="">All</button>
      </div>
      <div class="dietary-filters">
        <label class="dietary-toggle">
          <input type="checkbox" id="filterVeg"/> <span>🌿 Vegetarian</span>
        </label>
        <label class="dietary-toggle">
          <input type="checkbox" id="filterVegan"/> <span>🌱 Vegan</span>
        </label>
        <label class="dietary-toggle">
          <input type="checkbox" id="filterGf"/> <span>🌾 Gluten-Free</span>
        </label>
      </div>
    </div>

    <div class="menu-grid" id="menuGrid">
      <div class="loading-spinner">Loading menu…</div>
    </div>
  </main>

  <footer class="customer-footer">
    <p><strong>The Restaurant</strong> — Fine dining, warm welcome</p>
  </footer>

  <script th:src="@{/js/customer.js}" defer></script>
</body>
</html>
