<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reserve a Table — The Restaurant</title>
  <meta name="_csrf"        th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/customer.css}"/>
</head>
<body class="customer-layout" data-page="reserve">

  <nav class="customer-nav">
    <div class="nav-brand">
      <span class="nav-logo">🍽</span>
      <span class="nav-title">The Restaurant</span>
    </div>
    <ul class="nav-links">
      <li><a href="/customer/dashboard">Home</a></li>
      <li><a href="/customer/menu">Menu</a></li>
      <li><a href="/customer/reserve" class="active">Reserve</a></li>
      <li><a href="/customer/reservations">My Bookings</a></li>
    </ul>
    <form method="post" th:action="@{/logout}" class="nav-logout">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>

  <main class="customer-main">
    <section class="reserve-section">
      <h1 class="page-title">Make a Reservation</h1>
      <p class="page-subtitle">We'd love to have you. Book your table below.</p>

      <div class="reserve-card">
        <div id="reserveAlert" class="reserve-alert" style="display:none;"></div>

        <form id="reserveForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="resName">Full Name</label>
            <input type="text" id="resName" class="form-input" placeholder="John Smith" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Party Size</label>
            <div class="stepper">
              <button type="button" class="stepper-btn" id="decreaseParty">−</button>
              <span class="stepper-value" id="partyValue">2</span>
              <button type="button" class="stepper-btn" id="increaseParty">+</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="resDate">Date</label>
              <input type="date" id="resDate" class="form-input" required/>
            </div>
            <div class="form-group">
              <label class="form-label" for="resTime">Time</label>
              <select id="resTime" class="form-input form-select"></select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="resNotes">Special Requests</label>
            <textarea id="resNotes" class="form-input form-textarea" placeholder="Window seat, dietary requirements, celebrations…" rows="3"></textarea>
          </div>

          <button type="submit" class="btn-primary btn-full" id="reserveBtn">
            Book Table
          </button>
        </form>

        <div id="reserveSuccess" class="reserve-success" style="display:none;">
          <div class="success-icon">✅</div>
          <h3>Booking Confirmed!</h3>
          <p id="successSummary"></p>
          <a href="/customer/reservations" class="btn-primary" style="margin-top:16px; display:inline-block;">View My Bookings</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="customer-footer">
    <p><strong>The Restaurant</strong> — Fine dining, warm welcome</p>
  </footer>

  <script th:src="@{/js/customer.js}" defer></script>
</body>
</html>
