<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Reservations')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'reservations', 'Reservations')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title">Reservations</h1>
      <p class="page-subtitle" th:text="${reservations.totalElements} + ' total'"></p>
    </div>
    <a th:href="@{/reservations/new}" class="btn btn-primary">New Reservation</a>
  </div>

  <!-- Filters -->
  <div class="card" style="margin-bottom:var(--space-5);">
    <div class="card-body" style="padding:var(--space-4);">
      <form method="get" th:action="@{/reservations}" style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;">
        <div class="form-group" style="margin-bottom:0;flex:1;min-width:140px;">
          <label>Status</label>
          <select name="status" class="form-control" onchange="this.form.submit()">
            <option value="">All</option>
            <option value="PENDING"   th:selected="${param.status == 'PENDING'}">Pending</option>
            <option value="CONFIRMED" th:selected="${param.status == 'CONFIRMED'}">Confirmed</option>
            <option value="CANCELLED" th:selected="${param.status == 'CANCELLED'}">Cancelled</option>
            <option value="COMPLETED" th:selected="${param.status == 'COMPLETED'}">Completed</option>
            <option value="NO_SHOW"   th:selected="${param.status == 'NO_SHOW'}">No Show</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;flex:1;min-width:140px;">
          <label>Date</label>
          <input type="date" name="date" class="form-control" th:value="${param.date}"/>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Filter</button>
        <a th:href="@{/reservations}" class="btn btn-outline btn-sm">Reset</a>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Customer</th><th>Date &amp; Time</th><th>Party</th>
            <th>Table</th><th>Status</th><th>Special Requests</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${reservations.content}">
            <td>
              <div th:text="${r.customerName}">-</div>
              <div class="text-xs text-muted" th:text="${r.customerPhone}">-</div>
            </td>
            <td>
              <div th:text="${#temporals.format(r.reservationDateTime,'dd MMM yyyy')}">-</div>
              <div class="text-xs text-muted" th:text="${#temporals.format(r.reservationDateTime,'HH:mm')}">-</div>
            </td>
            <td th:text="${r.partySize} + ' guests'">-</td>
            <td th:text="${r.tableNumber != null ? 'T-' + r.tableNumber : '-'}">-</td>
            <td>
              <span class="badge" th:classappend="'badge-' + ${r.status}" th:text="${r.status}">-</span>
            </td>
            <td class="text-sm text-muted" th:text="${r.specialRequests}">-</td>
            <td>
              <div class="action-group">
                <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
                  <form th:if="${r.status == 'PENDING'}"
                        th:action="@{/reservations/{id}/confirm(id=${r.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-success btn-sm">Confirm</button>
                  </form>
                  <form th:if="${r.status != 'CANCELLED' and r.status != 'COMPLETED'}"
                        th:action="@{/reservations/{id}/cancel(id=${r.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Cancel this reservation?')">Cancel</button>
                  </form>
                </sec:authorize>
              </div>
            </td>
          </tr>
          <tr th:if="${reservations == null or reservations.totalElements == 0}">
            <td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:48px;">
              No reservations found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer" th:if="${reservations.totalPages > 1}">
      <nav class="pagination">
        <a th:href="@{/reservations(page=${reservations.number - 1})}"
           class="page-link" th:classappend="${reservations.first} ? 'disabled'">Prev</a>
        <span th:each="i : ${#numbers.sequence(0, reservations.totalPages - 1)}">
          <a class="page-link" th:classappend="${i == reservations.number} ? 'active'"
             th:href="@{/reservations(page=${i})}" th:text="${i + 1}">1</a>
        </span>
        <a th:href="@{/reservations(page=${reservations.number + 1})}"
           class="page-link" th:classappend="${reservations.last} ? 'disabled'">Next</a>
      </nav>
    </div>
  </div>

</main>
</div>
</body>
</html>
