<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('New Reservation')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'reservations', 'New Reservation')}">
<main>

  <div class="page-header">
    <h1 class="page-title">New Reservation</h1>
  </div>

  <div style="max-width:680px;">

    <div id="bookingSuccess" class="alert alert-success" style="display:none;">
      Reservation confirmed! We look forward to seeing you.
    </div>

    <div class="card">
      <div class="card-header"><h3>Booking Details</h3></div>
      <div class="card-body">
        <form id="reservationForm" th:action="@{/reservations}" method="post" novalidate>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" id="selectedTableId" name="tableId"/>
          <!-- Combined ISO datetime for Spring MVC binding to LocalDateTime reservedDate -->
          <input type="hidden" id="reservedDateHidden" name="reservedDate"/>

          <!-- Date + Time + Party size -->
          <div class="form-row">
            <div class="form-group">
              <label for="reservationDate">Date</label>
              <input type="date" id="reservationDate" name="reservationDate"
                     class="form-control" required
                     th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                     onchange="checkAvailability()"/>
              <span class="form-error" id="date-error"></span>
            </div>
            <div class="form-group">
              <label for="reservationTime">Time</label>
              <input type="time" id="reservationTime" name="reservationTime"
                     class="form-control" required onchange="checkAvailability()"/>
              <span class="form-error" id="time-error"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="partySize">Party Size</label>
            <input type="number" id="partySize" name="partySize" class="form-control"
                   min="1" max="20" value="2" required onchange="checkAvailability()"/>
          </div>

          <!-- Available tables (loaded via AJAX) -->
          <div id="availableTablesSection" style="display:none;margin-bottom:var(--space-5);">
            <label style="display:block;margin-bottom:8px;font-weight:600;">
              Available Tables
              <span class="loading-spinner" id="tablesSpinner" style="display:none;width:16px;height:16px;border-width:2px;vertical-align:middle;margin-left:8px;"></span>
            </label>
            <div id="availableTablesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;">
            </div>
          </div>

          <!-- Customer details -->
          <hr class="divider"/>
          <h4 style="margin-bottom:var(--space-4);">Customer Information</h4>

          <div class="form-row">
            <div class="form-group">
              <label for="customerName">Full Name</label>
              <input type="text" id="customerName" name="customerName"
                     class="form-control" required placeholder="Jane Doe"/>
              <span class="form-error" id="name-error"
                    th:if="${#fields.hasErrors('reservationRequest.customerName')}"
                    th:errors="${reservationRequest.customerName}"></span>
            </div>
            <div class="form-group">
              <label for="customerPhone">Phone</label>
              <input type="tel" id="customerPhone" name="customerPhone"
                     class="form-control" required placeholder="+60 12-345 6789"/>
            </div>
          </div>

          <div class="form-group">
            <label for="customerEmail">Email</label>
            <input type="email" id="customerEmail" name="customerEmail"
                   class="form-control" placeholder="jane@example.com"/>
          </div>

          <div class="form-group">
            <label for="specialRequests">Special Requests</label>
            <textarea id="specialRequests" name="notes" class="form-control"
                      rows="3" placeholder="Dietary restrictions, birthday, etc."></textarea>
          </div>

          <div id="formError" class="alert alert-danger" style="display:none;"></div>

          <button type="submit" class="btn btn-primary btn-block" id="bookBtn" disabled>
            Confirm Booking
          </button>
        </form>
      </div>
    </div>
  </div>

</main>
</div>

<script>
(function () {
  var csrf = document.querySelector('meta[name="_csrf"]') ? document.querySelector('meta[name="_csrf"]').content : '';
  var csrfHeader = document.querySelector('meta[name="_csrf_header"]') ? document.querySelector('meta[name="_csrf_header"]').content : 'X-CSRF-TOKEN';
  var selectedTable = null;
  var checkTimer = null;

  function checkAvailability() {
    var date = document.getElementById('reservationDate').value;
    var time = document.getElementById('reservationTime').value;
    var size = document.getElementById('partySize').value;
    if (!date || !time || !size) return;

    clearTimeout(checkTimer);
    checkTimer = setTimeout(function () {
      document.getElementById('availableTablesSection').style.display = 'block';
      document.getElementById('tablesSpinner').style.display = 'inline-block';
      document.getElementById('availableTablesGrid').innerHTML = '';
      selectedTable = null;
      document.getElementById('selectedTableId').value = '';
      document.getElementById('bookBtn').disabled = true;

      fetch('/api/v1/reservations/available-tables?date=' + date + '&time=' + time + '&partySize=' + size, {
        headers: { [csrfHeader]: csrf }
      })
      .then(function(r) { return r.json(); })
      .then(function(tables) {
        document.getElementById('tablesSpinner').style.display = 'none';
        var grid = document.getElementById('availableTablesGrid');
        if (!tables || tables.length === 0) {
          grid.innerHTML = '<p class="text-sm text-muted">No tables available for this time slot.</p>';
          return;
        }
        tables.forEach(function(t) {
          var div = document.createElement('div');
          div.className = 'table-tile status-AVAILABLE';
          div.setAttribute('data-table-id', t.id);
          div.innerHTML = '<div class="table-tile-number">' + t.tableNumber + '</div>'
            + '<div class="table-tile-seats">' + t.capacity + ' seats</div>';
          div.onclick = function() {
            document.querySelectorAll('#availableTablesGrid .table-tile').forEach(function(el) {
              el.style.outline = '';
            });
            div.style.outline = '3px solid var(--color-primary)';
            selectedTable = t.id;
            document.getElementById('selectedTableId').value = t.id;
            document.getElementById('bookBtn').disabled = false;
          };
          grid.appendChild(div);
        });
      })
      .catch(function() {
        document.getElementById('tablesSpinner').style.display = 'none';
      });
    }, 400);
  }

  window.checkAvailability = checkAvailability;

  // Combine separate date + time inputs into the hidden reservedDate field
  // before the form submits so Spring MVC can parse it as LocalDateTime.
  document.getElementById('reservationForm').addEventListener('submit', function() {
    var date = document.getElementById('reservationDate').value;
    var time = document.getElementById('reservationTime').value || '00:00';
    document.getElementById('reservedDateHidden').value = date + 'T' + time;
  });
})();
</script>
</body>
</html>
