<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Inventory Item')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'inventory', 'Inventory Item')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title" th:text="${item != null} ? 'Edit Inventory Item' : 'New Inventory Item'">Inventory Item</h1>
    </div>
    <a th:href="@{/inventory}" class="btn btn-outline btn-sm">Back to Inventory</a>
  </div>

  <div style="max-width:600px;">
    <div class="card">
      <div class="card-body">

        <!--
          novalidate removed — HTML5 constraint validation is the first line of
          defence; Bean Validation on InventoryItemRequest is the second.
          Attributes mirror the server constraints: required/@NotBlank,
          minlength/@Size.min, maxlength/@Size.max, min/@PositiveOrZero,
          min=0.01/@Positive.
        -->
        <form th:action="${item != null} ? @{/inventory/{id}(id=${item.id})} : @{/inventory}"
              th:object="${inventoryItemRequest}"
              method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="alert alert-danger"
               th:if="${#fields.hasGlobalErrors()}"
               th:errors="*{global}"></div>

          <div class="form-group">
            <label for="name">Item Name <span style="color:var(--color-danger)">*</span></label>
            <!-- @NotBlank + @Size(min=2, max=150) -->
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   required minlength="2" maxlength="150"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="e.g. Chicken Breast"/>
            <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="unit">Unit <span style="color:var(--color-danger)">*</span></label>
              <!-- @NotBlank + @Size(max=30) -->
              <input type="text" id="unit" th:field="*{unit}" class="form-control"
                     required maxlength="30"
                     th:classappend="${#fields.hasErrors('unit')} ? 'is-invalid'"
                     placeholder="kg / L / pcs"/>
              <span class="form-error" th:if="${#fields.hasErrors('unit')}" th:errors="*{unit}"></span>
            </div>
            <div class="form-group">
              <label for="supplierName">Supplier</label>
              <!-- @Size(max=200) -->
              <input type="text" id="supplierName" th:field="*{supplierName}" class="form-control"
                     maxlength="200" placeholder="Supplier name (optional)"/>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="currentStock">Current Stock <span style="color:var(--color-danger)">*</span></label>
              <!-- @NotNull + @PositiveOrZero (>= 0) -->
              <input type="number" id="currentStock" th:field="*{currentStock}" class="form-control"
                     required step="0.01" min="0"
                     th:classappend="${#fields.hasErrors('currentStock')} ? 'is-invalid'"/>
              <span class="form-error" th:if="${#fields.hasErrors('currentStock')}" th:errors="*{currentStock}"></span>
            </div>
            <div class="form-group">
              <label for="minimumStock">Minimum Stock <span style="color:var(--color-danger)">*</span></label>
              <!-- @NotNull + @PositiveOrZero (>= 0) -->
              <input type="number" id="minimumStock" th:field="*{minimumStock}" class="form-control"
                     required step="0.01" min="0"
                     th:classappend="${#fields.hasErrors('minimumStock')} ? 'is-invalid'"/>
              <span class="form-error" th:if="${#fields.hasErrors('minimumStock')}" th:errors="*{minimumStock}"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="costPerUnit">Cost per Unit (RM) <span style="color:var(--color-danger)">*</span></label>
            <!-- @NotNull + @Positive (> 0) -->
            <input type="number" id="costPerUnit" th:field="*{costPerUnit}" class="form-control"
                   required step="0.01" min="0.01"
                   th:classappend="${#fields.hasErrors('costPerUnit')} ? 'is-invalid'"/>
            <span class="form-error" th:if="${#fields.hasErrors('costPerUnit')}" th:errors="*{costPerUnit}"></span>
          </div>

          <div class="form-actions">
            <a th:href="@{/inventory}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary"
                    th:text="${item != null} ? 'Save Changes' : 'Create Item'">Save</button>
          </div>
        </form>

      </div>
    </div>
  </div>

</main>
</div>
</body>
</html>
