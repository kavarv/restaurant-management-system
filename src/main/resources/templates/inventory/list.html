<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Inventory')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'inventory', 'Inventory')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title">Inventory</h1>
      <p class="page-subtitle">Stock levels and alerts</p>
    </div>
    <div class="action-group">
      <a th:href="@{/inventory/export?format=csv}" class="btn btn-outline btn-sm">Export CSV</a>
      <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
        <a th:href="@{/inventory/new}" class="btn btn-primary">Add Item</a>
      </sec:authorize>
    </div>
  </div>

  <!-- Summary bar -->
  <div class="grid grid-3" style="margin-bottom:var(--space-5);">
    <div class="stat-card">
      <div class="stat-label">Total Items</div>
      <div class="stat-value" th:text="${inventorySummary?.totalItems ?: 0}">0</div>
    </div>
    <div class="stat-card accent-red">
      <div class="stat-label">Low Stock</div>
      <div class="stat-value" style="color:var(--color-warning);"
           th:text="${inventorySummary?.lowStockCount ?: 0}">0</div>
      <div class="stat-sub">Below reorder threshold</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Out of Stock</div>
      <div class="stat-value" style="color:var(--color-danger);"
           th:text="${inventorySummary?.outOfStockCount ?: 0}">0</div>
    </div>
  </div>

  <!-- Search + filter -->
  <div class="card" style="margin-bottom:var(--space-5);">
    <div class="card-body" style="padding:var(--space-4);">
      <form method="get" th:action="@{/inventory}" style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="search-wrapper" style="flex:1;min-width:200px;">
          <span class="search-icon">&#128269;</span>
          <input type="text" name="q" class="form-control" placeholder="Search items..."
                 th:value="${param.q}"/>
        </div>
        <div class="form-group" style="margin-bottom:0;min-width:140px;">
          <label>Filter</label>
          <select name="filter" class="form-control" onchange="this.form.submit()">
            <option value="">All Items</option>
            <option value="LOW"  th:selected="${param.filter == 'LOW'}">Low Stock</option>
            <option value="OUT"  th:selected="${param.filter == 'OUT'}">Out of Stock</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Search</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table" id="inventoryTable">
        <thead>
          <tr>
            <th class="sortable" onclick="sortTable(0)">Item Name</th>
            <th>Unit</th>
            <th class="sortable" onclick="sortTable(2)">Current Stock</th>
            <th>Reorder At</th>
            <th>Stock Level</th>
            <th>Status</th>
            <th>Adjust Stock</th>
            <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
              <th>Actions</th>
            </sec:authorize>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${items}"
              th:classappend="${item.currentStock == 0} ? 'row-danger' : (${item.currentStock <= item.minimumStock} ? 'row-warning' : '')"
              th:attr="data-current-stock=${item.currentStock}">
            <td>
              <strong th:text="${item.name}">-</strong>
            </td>
            <td th:text="${item.unit}">-</td>
            <td>
              <strong th:text="${item.currentStock}">0</strong>
            </td>
            <td th:text="${item.minimumStock}">0</td>
            <td style="width:120px;">
              <div class="progress">
                <div class="progress-bar"
                     th:classappend="${item.currentStock == 0} ? 'danger' : (${item.currentStock <= item.minimumStock} ? 'warn' : '')"
                     th:style="'width:' + ${#numbers.formatDecimal(
                       (item.currentStock / (item.minimumStock * 2.0)) * 100 > 100 ? 100 :
                       (item.currentStock / (item.minimumStock * 2.0)) * 100, 0, 0)} + '%'">
                </div>
              </div>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${item.currentStock == 0} ? 'badge-danger' : (${item.currentStock <= item.minimumStock} ? 'badge-warning' : 'badge-success')"
                    th:text="${item.currentStock == 0} ? 'OUT OF STOCK' : (${item.currentStock <= item.minimumStock} ? 'LOW STOCK' : 'OK')">
                OK
              </span>
            </td>
            <td>
              <form th:action="@{/api/v1/inventory/{id}/adjust(id=${item.id})}" method="post"
                    class="flex items-center gap-2" style="gap:6px;"
                    onsubmit="submitAdjust(event, this)">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="number" name="quantity" class="form-control"
                       style="width:70px;padding:4px 8px;" placeholder="0"
                       min="-9999" max="9999"/>
                <select name="type" class="form-control" style="width:90px;padding:4px 6px;">
                  <option value="ADD">Add</option>
                  <option value="REMOVE">Remove</option>
                  <option value="SET">Set</option>
                </select>
                <button type="submit" class="btn btn-primary btn-sm">OK</button>
              </form>
            </td>
            <sec:authorize access="hasAnyRole('ADMIN','MANAGER')">
              <td>
                <div class="action-group">
                  <a th:href="@{/inventory/{id}/edit(id=${item.id})}" class="btn btn-outline btn-sm">Edit</a>
                  <form th:action="@{/inventory/{id}/delete(id=${item.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this item?')">Del</button>
                  </form>
                </div>
              </td>
            </sec:authorize>
          </tr>
          <tr th:if="${items == null or #lists.isEmpty(items)}">
            <td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:48px;">
              No inventory items found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>
</div>

<script>
function submitAdjust(e, form) {
  e.preventDefault();
  var csrf       = document.querySelector('meta[name="_csrf"]');
  var csrfHeader = document.querySelector('meta[name="_csrf_header"]');
  var fd         = new FormData(form);
  var qty        = parseFloat(fd.get('quantity')) || 0;
  var type       = fd.get('type');
  // API expects: { quantity: signed BigDecimal, reason: String }
  // positive = credit (add), negative = debit (remove)
  if (type === 'REMOVE') qty = -Math.abs(qty);
  else if (type === 'SET') {
    var row         = form.closest('tr');
    var currentStock = parseFloat(row ? row.querySelector('[data-current-stock]')?.dataset.currentStock : 0) || 0;
    qty = qty - currentStock; // delta to reach the target value
  }
  var payload = { quantity: qty, reason: type + ' via inventory list' };
  fetch(form.action, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      [csrfHeader ? csrfHeader.content : 'X-CSRF-TOKEN']: csrf ? csrf.content : ''
    },
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) { location.reload(); }
    else { r.text().then(function(t) { alert('Failed: ' + (t || 'error')); }); }
  });
}

function sortTable(colIdx) {
  var table = document.getElementById('inventoryTable');
  var rows = Array.from(table.querySelectorAll('tbody tr'));
  var dir = table.getAttribute('data-sort-col') == colIdx && table.getAttribute('data-sort-dir') == 'asc' ? 'desc' : 'asc';
  table.setAttribute('data-sort-col', colIdx);
  table.setAttribute('data-sort-dir', dir);
  rows.sort(function(a, b) {
    var aVal = a.cells[colIdx] ? a.cells[colIdx].textContent.trim() : '';
    var bVal = b.cells[colIdx] ? b.cells[colIdx].textContent.trim() : '';
    var aNum = parseFloat(aVal), bNum = parseFloat(bVal);
    if (!isNaN(aNum) && !isNaN(bNum)) return dir === 'asc' ? aNum - bNum : bNum - aNum;
    return dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
  });
  var tbody = table.querySelector('tbody');
  rows.forEach(function(r) { tbody.appendChild(r); });
}
</script>
</body>
</html>
