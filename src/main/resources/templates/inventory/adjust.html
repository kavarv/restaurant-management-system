<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Adjust Stock')}"></head>

<body>
<div th:replace="~{fragments/layout :: layout(~{::main}, 'inventory', 'Adjust Stock')}">
<main>

  <div class="page-header">
    <div>
      <h1 class="page-title">Adjust Stock</h1>
      <p class="page-subtitle" th:text="${item.name}">Item</p>
    </div>
    <a th:href="@{/inventory}" class="btn btn-outline btn-sm">Back to Inventory</a>
  </div>

  <div style="max-width:480px;">

    <!-- Current stock summary -->
    <div class="card" style="margin-bottom:var(--space-5);">
      <div class="card-body" style="display:flex;gap:var(--space-6);">
        <div>
          <div class="text-xs text-muted">Current Stock</div>
          <div class="stat-value" th:text="${item.currentStock} + ' ' + ${item.unit}">0</div>
        </div>
        <div>
          <div class="text-xs text-muted">Minimum Stock</div>
          <div class="stat-value" th:text="${item.minimumStock} + ' ' + ${item.unit}">0</div>
        </div>
        <div>
          <div class="text-xs text-muted">Status</div>
          <span class="badge"
                th:classappend="${item.currentStock == 0} ? 'badge-danger' : (${item.lowStock} ? 'badge-warning' : 'badge-success')"
                th:text="${item.currentStock == 0} ? 'OUT' : (${item.lowStock} ? 'LOW' : 'OK')">OK</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>Stock Adjustment</h3></div>
      <div class="card-body">

        <form th:action="@{/inventory/{id}/adjust(id=${item.id})}"
              th:object="${adjustStockRequest}"
              method="post" novalidate>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="alert alert-danger"
               th:if="${#fields.hasGlobalErrors()}"
               th:errors="*{global}"></div>

          <div class="form-group">
            <label for="quantity">Quantity <span style="color:var(--color-danger)">*</span></label>
            <input type="number" id="quantity" th:field="*{quantity}" class="form-control"
                   step="0.01"
                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                   placeholder="Use negative to remove stock"/>
            <div class="form-hint">Positive = add stock &bull; Negative = remove stock</div>
            <span class="form-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
          </div>

          <div class="form-group">
            <label for="reason">Reason <span style="color:var(--color-danger)">*</span></label>
            <input type="text" id="reason" th:field="*{reason}" class="form-control"
                   th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'"
                   placeholder="e.g. Received delivery, Damaged goods, Stock count"/>
            <span class="form-error" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></span>
          </div>

          <div class="form-actions">
            <a th:href="@{/inventory}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Apply Adjustment</button>
          </div>
        </form>

      </div>
    </div>
  </div>

</main>
</div>
</body>
</html>
