# ============================================================
# Restaurant Management System — application.properties
# Active profile is set via -Dspring.profiles.active=dev|prod
# ============================================================

# ── Spring profile activation (override on command line or env var) ──
spring.profiles.active=dev

# ── Data source ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Kav13arV}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── SQL Init ──────────────────────────────────────────────────────────
# Run schema.sql against external (non-embedded) databases automatically.
# 'always' → schema.sql executes on every startup (safe: all DDL uses IF NOT EXISTS).
# This must run BEFORE Hibernate validation, which is the default order
# (spring.jpa.defer-datasource-initialization defaults to false).
spring.sql.init.mode=always

# ── JPA / Hibernate ───────────────────────────────────────────────────
# validate: Hibernate checks the schema matches entities but never modifies it.
# Schema is created by schema.sql above, so 'validate' is correct here.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────
server.port=8080

# ── Thymeleaf ─────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── File upload ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── WebSocket ─────────────────────────────────────────────────────────
websocket.allowed-origins=http://localhost:8080

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── SpringDoc / Swagger UI ────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
s
# ── SpringDoc / Swagger UI (full config) ─────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=2
springdoc.swagger-ui.docExpansion=list
# Allow Swagger UI & api-docs through security without auth
springdoc.pathsToMatch=/api/**
