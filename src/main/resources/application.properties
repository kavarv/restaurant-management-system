# ==============================================================================
# application.properties  —  BASE / SHARED configuration
# Active profile is selected at runtime:
#   -Dspring.profiles.active=dev   (development)
#   -Dspring.profiles.active=prod  (production)
# Values in the active profile file OVERRIDE these base values.
# ==============================================================================

# Active profile default (override via env var SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev


# ──────────────────────────────────────────────────────────────────────────────
# SERVER
# ──────────────────────────────────────────────────────────────────────────────
# HTTP port; override in prod profile or via SERVER_PORT env var
server.port=8080

# Servlet context path — keep / unless you need /api as prefix globally
server.servlet.context-path=/


# ──────────────────────────────────────────────────────────────────────────────
# DATASOURCE
# ──────────────────────────────────────────────────────────────────────────────
# useSSL=false        -> no TLS for local dev (enable in prod)
# serverTimezone=UTC  -> avoids JVM/MySQL TZ mismatch warnings
# allowPublicKeyRetrieval=true -> needed for caching_sha2_password (MySQL 8 default)
spring.datasource.url=jdbc:mysql://localhost:3306/rms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# NEVER hard-code credentials — inject via environment variables or secrets mgr
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP connection pool (Spring Boot default)
spring.datasource.hikari.pool-name=RmsHikariPool
# max simultaneous DB connections
spring.datasource.hikari.maximum-pool-size=10
# keep at least 2 connections warm
spring.datasource.hikari.minimum-idle=2
# fail-fast after 30 s if no connection available
spring.datasource.hikari.connection-timeout=30000
# release idle connections after 10 min
spring.datasource.hikari.idle-timeout=600000
# recycle connections after 30 min
spring.datasource.hikari.max-lifetime=1800000


# ──────────────────────────────────────────────────────────────────────────────
# JPA / HIBERNATE
# ──────────────────────────────────────────────────────────────────────────────
# WHY "validate" and NOT "create-drop" or "update" in production:
#   - "create-drop"  wipes all data on every restart — catastrophic in prod
#   - "update"       applies additive schema changes silently, can corrupt data
#                    and cannot handle column renames or type changes safely
#   - "validate"     checks that entity mappings match the DB schema at startup
#                    and FAILS FAST if there is a mismatch — safe and explicit
#   -> Use Flyway or Liquibase for controlled, versioned schema migrations
spring.jpa.hibernate.ddl-auto=validate

# Log SQL statements to console (dev only — turn OFF in prod profile)
spring.jpa.show-sql=true

# Indent multi-line SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# Use MySQL 8 dialect explicitly (auto-detected from driver but explicit is safer)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Named queries plan cache size
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048


# ──────────────────────────────────────────────────────────────────────────────
# THYMELEAF
# ──────────────────────────────────────────────────────────────────────────────
# Template location (default — keep unless you need a custom path)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Disable cache in DEV so template changes are reflected without restart.
# MUST be true in production for performance.
spring.thymeleaf.cache=false


# ──────────────────────────────────────────────────────────────────────────────
# FILE UPLOAD (Multipart)
# ──────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
# max single file upload size
spring.servlet.multipart.max-file-size=10MB
# max total request body size
spring.servlet.multipart.max-request-size=20MB
# spool to disk above this threshold
spring.servlet.multipart.file-size-threshold=2KB


# ──────────────────────────────────────────────────────────────────────────────
# WEBSOCKET
# ──────────────────────────────────────────────────────────────────────────────
# Comma-separated allowed origins for the STOMP WebSocket endpoint.
# In prod replace with your actual domain(s).
app.websocket.allowed-origins=http://localhost:8080,http://localhost:3000


# ──────────────────────────────────────────────────────────────────────────────
# SPRING SECURITY
# ──────────────────────────────────────────────────────────────────────────────
# Logging for security events (DEBUG in dev, WARN or INFO in prod)
logging.level.org.springframework.security=DEBUG


# ──────────────────────────────────────────────────────────────────────────────
# ACTUATOR
# ──────────────────────────────────────────────────────────────────────────────
# Expose health + info over HTTP; metrics require separate Prometheus/Grafana setup
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
# hide internals from anonymous users — only ACTUATOR_ADMIN role sees full detail
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
# allow info.* keys in properties to appear at /actuator/info
management.info.env.enabled=true


# ──────────────────────────────────────────────────────────────────────────────
# APPLICATION INFO (visible at /actuator/info)
# ──────────────────────────────────────────────────────────────────────────────
info.app.name=Restaurant Management System
info.app.version=0.0.1-SNAPSHOT
info.app.description=Full-stack restaurant operations platform


# ──────────────────────────────────────────────────────────────────────────────
# SPRINGDOC / SWAGGER UI
# ──────────────────────────────────────────────────────────────────────────────
# Swagger UI:    http://localhost:8080/swagger-ui.html
# OpenAPI JSON:  http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# sort endpoints by HTTP method
springdoc.swagger-ui.operationsSorter=method
# sort tag groups alphabetically
springdoc.swagger-ui.tagsSorter=alpha
# enable the "Try it out" button in Swagger UI
springdoc.swagger-ui.try-it-out-enabled=true


# ──────────────────────────────────────────────────────────────────────────────
# LOGGING (base — overridden per profile)
# ──────────────────────────────────────────────────────────────────────────────
logging.level.root=INFO
# verbose logging for our own application code
logging.level.com.restaurant.rms=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
